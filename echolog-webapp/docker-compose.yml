# CEG491X-Capstone/echolog-webapp/docker-compose.yml
version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: echolog-redis
    ports:
      - "6379:6379"
    networks:
      - echolog-net

  backend:
    build:
      context: .
      target: backend
    container_name: echolog-backend
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - redis
    volumes:
      - ./backend/uploads:/app/backend/uploads   # persist uploads
    networks:
      - echolog-net

  frontend:
    build:
      context: .
      target: frontend
    container_name: echolog-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - echolog-net

networks:
  echolog-net:
    driver: bridge